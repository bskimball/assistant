<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Compass">
  <style>
    svg {
      color-scheme: light dark;
    }

    .bg {
      fill: #f4f1ec;
    }

    .ring {
      stroke: #9f2437;
    }

    .needle {
      fill: #bd2f45;
    }

    .needle-dark {
      fill: #7d1829;
    }

    .cardinal {
      fill: #2f332f;
    }

    .sage {
      fill: #7d8b72;
    }

    .brass {
      fill: #b88b45;
    }

    .shadow {
      stroke: rgba(50, 36, 30, 0.16);
    }

    .highlight {
      fill: rgba(255, 255, 255, 0.48);
    }

    @media (prefers-color-scheme: dark) {
      .bg {
        fill: #151821;
      }

      .ring {
        stroke: #ff6b7f;
      }

      .needle {
        fill: #ff5a72;
      }

      .needle-dark {
        fill: #a72338;
      }

      .cardinal {
        fill: #f1eee7;
      }

      .sage {
        fill: #a9ba9a;
      }

      .brass {
        fill: #d9aa5a;
      }

      .shadow {
        stroke: rgba(0, 0, 0, 0.42);
      }

      .highlight {
        fill: rgba(255, 255, 255, 0.16);
      }
    }
  </style>

  <rect class="bg" width="512" height="512" rx="104" />
  <path
    class="shadow"
    d="M92 430c37 31 292 31 328 0"
    fill="none"
