    <circle class="brass" cx="0" cy="204" r="24" />
    <rect class="sage" x="-224" y="-18" width="36" height="36" rx="6" transform="rotate(45 -206 0)" />
    <rect class="brass" x="188" y="-18" width="36" height="36" rx="6" />

    <path class="needle-dark" d="M-126 174 48-28 160-170-14 32z" />
    <path class="needle" d="M-126 174 28-42 160-170 4 74z" />
